<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>WeatherWise Radar</title>
        <link rel="stylesheet"
              href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"/>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body {
                width: 100%; height: 100%;
                overflow: hidden;
                background: #aad3df;
            }
            #map {
                width: 100%; height: 100%;
                background: #aad3df;
                position: absolute;
                top: 0; left: 0;
            }
            .leaflet-control-attribution { font-size: 9px; opacity: 0.5; }
            .leaflet-popup-content-wrapper {
                background: #1e293b; color: white;
                border-radius: 12px; border: 1px solid #334155;
            }
            .leaflet-popup-tip { background: #1e293b; }
            .current-location-marker {
                background: #2b8cee;
                border: 3px solid white;
                border-radius: 50%;
                box-shadow: 0 0 0 4px rgba(43,140,238,0.35);
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%   { box-shadow: 0 0 0 0   rgba(43,140,238,0.5); }
                70%  { box-shadow: 0 0 0 14px rgba(43,140,238,0); }
                100% { box-shadow: 0 0 0 0   rgba(43,140,238,0); }
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            var map = null;
            // API Key diisi dari Java via setApiKey()
            var API_KEY = "";
            var weatherLayers = {};
            var simulationCircles = [];
            var currentMarker = null;

            // Default: Jakarta, Indonesia
            var DEFAULT_LAT = -6.2088;
            var DEFAULT_LON = 106.8456;
            var DEFAULT_CITY = "Jakarta, ID";

            var radarData = {
                precipitation: [
                    [-6.10, 106.75, '#93c5fd', 0.35],
                    [-6.20, 106.82, '#4ade80', 0.35],
                    [-6.25, 106.90, '#facc15', 0.35],
                    [-6.30, 107.00, '#f97316', 0.35],
                    [-6.15, 106.95, '#ef4444', 0.35],
                    [-6.35, 106.80, '#4ade80', 0.30]
                ],
                clouds: [
                    [-6.05, 106.70, '#93c5fd', 0.30],
                    [-6.20, 106.84, '#4ade80', 0.30],
                    [-6.28, 106.92, '#facc15', 0.30],
                    [-6.32, 107.05, '#93c5fd', 0.25]
                ],
                wind: [
                    [-6.08, 106.78, '#facc15', 0.30],
                    [-6.20, 106.84, '#f97316', 0.35],
                    [-6.32, 106.88, '#4ade80', 0.30],
                    [-6.05, 107.00, '#93c5fd', 0.25]
                ],
                temp: [
                    [-6.05, 106.70, '#ef4444', 0.30],
                    [-6.20, 106.84, '#facc15', 0.35],
                    [-6.32, 106.88, '#f97316', 0.40],
                    [-6.08, 107.00, '#93c5fd', 0.30]
                ]
            };

            function setMapSize() {
                var mapDiv = document.getElementById('map');
                mapDiv.style.width  = window.innerWidth  + 'px';
                mapDiv.style.height = window.innerHeight + 'px';
            }

            /** Dipanggil dari Java: injeksi API key agar tile layer OWM aktif */
            function setApiKey(key) {
                API_KEY = key;
                // Re-init layer OWM jika map sudah ada
                if (map !== null) {
                    ['precipitation_new','clouds_new','wind_new','temp_new'].forEach(function(name) {
                        var shortName = name.replace('_new','');
                        if (weatherLayers[shortName]) {
                            if (map.hasLayer(weatherLayers[shortName])) {
                                map.removeLayer(weatherLayers[shortName]);
                            }
                        }
                        weatherLayers[shortName] = L.tileLayer(
                            'https://tile.openweathermap.org/map/' + name + '/{z}/{x}/{y}.png?appid=' + API_KEY,
                            { opacity: 0.7, maxZoom: 18 }
                        );
                    });
                }
            }

            function initMap() {
                setMapSize();

                if (map !== null) {
                    setMapSize();
                    map.invalidateSize({ animate: false });
                    return;
                }

                map = L.map('map', {
                    center: [DEFAULT_LAT, DEFAULT_LON],
                    zoom: 10,
                    zoomControl: false,
                    preferCanvas: true,
                    dragging: true,
                    touchZoom: true,
                    scrollWheelZoom: true,
                    doubleClickZoom: true
                });

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    keepBuffer: 4,
                    updateWhenIdle: false,
                    updateWhenZooming: false,
                    subdomains: ['a','b','c'],
                    attribution: '\u00a9 OpenStreetMap contributors'
                }).addTo(map);

                // Inisialisasi OWM tile layers
                ['precipitation_new','clouds_new','wind_new','temp_new'].forEach(function(name) {
                    var shortName = name.replace('_new','');
                    weatherLayers[shortName] = L.tileLayer(
                        'https://tile.openweathermap.org/map/' + name + '/{z}/{x}/{y}.png?appid=' + (API_KEY || ''),
                        { opacity: 0.7, maxZoom: 18 }
                    );
                });

                var currentIcon = L.divIcon({
                    className: 'current-location-marker',
                    iconSize:  [16, 16],
                    iconAnchor:[8, 8]
                });
                currentMarker = L.marker([DEFAULT_LAT, DEFAULT_LON], { icon: currentIcon })
                    .bindPopup('<b>' + DEFAULT_CITY + '</b><br>Loading...')
                    .addTo(map);

                showSimulatedRadar('precipitation');

                setTimeout(function() {
                    setMapSize();
                    map.invalidateSize({ animate: false });
                }, 100);
            }

            function showSimulatedRadar(type) {
                simulationCircles.forEach(function(c) {
                    if (map && map.hasLayer(c)) map.removeLayer(c);
                });
                simulationCircles = [];
                var points = radarData[type] || radarData.precipitation;
                points.forEach(function(p) {
                    var circle = L.circle([p[0], p[1]], {
                        radius: 7000,
                        color: 'transparent',
                        fillColor: p[2],
                        fillOpacity: p[3],
                        interactive: false
                    }).addTo(map);
                    simulationCircles.push(circle);
                });
            }

            function onResize(w, h) {
                var mapDiv = document.getElementById('map');
                mapDiv.style.width  = w + 'px';
                mapDiv.style.height = h + 'px';
                if (map) map.invalidateSize({ animate: false });
            }

            function zoomIn()  { if (map) map.zoomIn(); }
            function zoomOut() { if (map) map.zoomOut(); }

            function goToCurrentLocation() {
                if (!map) return;
                map.flyTo([DEFAULT_LAT, DEFAULT_LON], 12, { animate: true, duration: 1.0 });
                if (currentMarker) currentMarker.openPopup();
            }

            function setWeatherLayer(layerName) {
                if (!map) return;
                Object.values(weatherLayers).forEach(function(l) {
                    if (map.hasLayer(l)) map.removeLayer(l);
                });
                // Gunakan tile OWM jika API key tersedia, fallback ke simulasi
                if (API_KEY && API_KEY.length > 10 && weatherLayers[layerName]) {
                    weatherLayers[layerName].addTo(map);
                }
                showSimulatedRadar(layerName);
            }

            function flyToCity(lat, lng, name, desc) {
                if (!map) return;
                DEFAULT_LAT  = lat;
                DEFAULT_LON  = lng;
                DEFAULT_CITY = name;
                map.flyTo([lat, lng], 12, { animate: true, duration: 1.2 });
                if (currentMarker) {
                    currentMarker.setLatLng([lat, lng]);
                    currentMarker.setPopupContent('<b>' + name + '</b><br>' + desc);
                    currentMarker.openPopup();
                }
            }
        </script>
    </body>
</html>
