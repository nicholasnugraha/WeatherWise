<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>WeatherWise Radar</title>
    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        #map {
            width: 100%; height: 100%;
            position: absolute; top: 0; left: 0;
        }

        /* ── Legend ── */
        #heatmap-legend {
            position: absolute;
            bottom: 28px; left: 16px;
            z-index: 1000;
            background: rgba(15,23,42,0.85);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            color: white; font-size: 11px;
            min-width: 210px;
            display: none;
        }
        #heatmap-legend .legend-title {
            font-weight: 700; font-size: 12px;
            margin-bottom: 7px;
        }
        #heatmap-legend .legend-bar {
            height: 10px; width: 100%;
            border-radius: 5px; margin-bottom: 5px;
        }
        #heatmap-legend .legend-labels {
            display: flex; justify-content: space-between;
            opacity: 0.65; font-size: 10px;
        }

        .leaflet-control-attribution { font-size: 9px; opacity: 0.45; }
        .leaflet-popup-content-wrapper {
            background: #1e293b; color: white;
            border-radius: 12px; border: 1px solid #334155;
        }
        .leaflet-popup-tip { background: #1e293b; }

        .current-location-marker {
            background: #2b8cee;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(43,140,238,0.35);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0   rgba(43,140,238,0.5); }
            70%  { box-shadow: 0 0 0 14px rgba(43,140,238,0); }
            100% { box-shadow: 0 0 0 0   rgba(43,140,238,0); }
        }
    </style>
</head>
<body>

<div id="map"></div>

<div id="heatmap-legend">
    <div class="legend-title" id="legend-title"></div>
    <div class="legend-bar"   id="legend-bar"></div>
    <div class="legend-labels">
        <span id="legend-min"></span>
        <span id="legend-max"></span>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"></script>

<script>
    // ════════════════════════════════════════════════════════
    // STATE
    // ════════════════════════════════════════════════════════
    var map           = null;
    var OWM_API_KEY   = "";
    var MT_API_KEY    = "";
    var currentMarker = null;
    var baseTileLayer = null;
    var weatherLayer  = null;       // OWM weather tile layer aktif
    var currentLayer  = "precipitation";

    var DEFAULT_LAT  = -6.2088;
    var DEFAULT_LON  = 106.8456;
    var DEFAULT_CITY = "Jakarta, ID";

    // ── Konfigurasi per layer ────────────────────────────────
    // owmName   : nama layer di OWM tile API
    // opacity   : transparansi overlay (0.0 – 1.0)
    // legend    : info untuk legend bar di overlay UI
    // ────────────────────────────────────────────────────────
    var LAYER_CONFIG = {
        precipitation: {
            owmName:     "precipitation_new",
            opacity:     0.75,
            title:       "🌧 Precipitation",
            gradientCss: "linear-gradient(to right,#93c5fd,#4ade80,#facc15,#f97316,#ef4444)",
            legendMin:   "Rendah",
            legendMax:   "Lebat"
        },
        clouds: {
            owmName:     "clouds_new",
            opacity:     0.65,
            title:       "☁️ Cloud Cover",
            gradientCss: "linear-gradient(to right,#f0f9ff,#93c5fd,#60a5fa,#1d4ed8)",
            legendMin:   "Cerah (0%)",
            legendMax:   "Mendung (100%)"
        },
        wind: {
            owmName:     "wind_new",
            opacity:     0.70,
            title:       "💨 Wind Speed",
            gradientCss: "linear-gradient(to right,#d1fae5,#6ee7b7,#facc15,#f97316,#dc2626)",
            legendMin:   "Tenang",
            legendMax:   "Badai"
        },
        temp: {
            owmName:     "temp_new",
            opacity:     0.70,
            title:       "🌡 Temperature",
            gradientCss: "linear-gradient(to right,#7dd3fc,#4ade80,#facc15,#f97316,#ef4444)",
            legendMin:   "Dingin",
            legendMax:   "Panas"
        }
    };

    // ════════════════════════════════════════════════════════
    // API KEY INJECTION — dipanggil RadarMapController.java
    // ════════════════════════════════════════════════════════
    function setApiKey(key) {
        OWM_API_KEY = key;
        // Rebuild weather tile layer dengan key yang baru
        if (map !== null) _applyWeatherLayer(currentLayer);
    }

    function setMaptilerApiKey(key) {
        MT_API_KEY = key;
        if (map !== null) _rebuildBaseTile();
    }

    // ════════════════════════════════════════════════════════
    // INIT MAP
    // ════════════════════════════════════════════════════════
    function initMap() {
        var mapDiv = document.getElementById("map");
        mapDiv.style.width  = window.innerWidth  + "px";
        mapDiv.style.height = window.innerHeight + "px";

        if (map !== null) {
            map.invalidateSize({ animate: false });
            return;
        }

        map = L.map("map", {
            center:          [DEFAULT_LAT, DEFAULT_LON],
            zoom:            8,
            zoomControl:     false,
            preferCanvas:    true,
            dragging:        true,
            scrollWheelZoom: true,
            doubleClickZoom: true,
            touchZoom:       true
        });

        _rebuildBaseTile();

        var currentIcon = L.divIcon({
            className: "current-location-marker",
            iconSize:  [16, 16], iconAnchor: [8, 8]
        });
        currentMarker = L.marker([DEFAULT_LAT, DEFAULT_LON], { icon: currentIcon })
            .bindPopup("<b>" + DEFAULT_CITY + "</b><br>Memuat cuaca...")
            .addTo(map);

        setTimeout(function() {
            mapDiv.style.width  = window.innerWidth  + "px";
            mapDiv.style.height = window.innerHeight + "px";
            map.invalidateSize({ animate: false });
        }, 100);
    }

    // ════════════════════════════════════════════════════════
    // BASE TILE — MapTiler jika key ada, fallback OSM
    // ════════════════════════════════════════════════════════
    function _rebuildBaseTile() {
    if (!map) return;
    if (baseTileLayer) { map.removeLayer(baseTileLayer); baseTileLayer = null; }

    if (MT_API_KEY) {
        baseTileLayer = L.tileLayer(
            "https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=" + MT_API_KEY,
            {
                maxZoom: 18, keepBuffer: 4,
                updateWhenIdle: false, updateWhenZooming: false,
                attribution: "\u00a9 <a href='https://www.maptiler.com/'>MapTiler</a> \u00a9 OSM"
            }
        );
    } else {
        baseTileLayer = L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                maxZoom: 18, subdomains: ["a","b","c"],
                attribution: "\u00a9 OpenStreetMap contributors"
            }
        );
    }
    baseTileLayer.addTo(map);

    // ✅ FIX: re-apply weather layer SETELAH base tile ditambahkan
    // supaya weather layer selalu berada di atas
    if (OWM_API_KEY && OWM_API_KEY.length >= 10) {
        _applyWeatherLayer(currentLayer);
    }
}


    // ════════════════════════════════════════════════════════
    // WEATHER TILE LAYER — OWM tile overlay per layer
    // ════════════════════════════════════════════════════════
    function _applyWeatherLayer(layerName) {
        if (!map) return;

        // Hapus layer lama
        if (weatherLayer && map.hasLayer(weatherLayer)) {
            map.removeLayer(weatherLayer);
            weatherLayer = null;
        }

        var cfg = LAYER_CONFIG[layerName];
        if (!cfg || !OWM_API_KEY || OWM_API_KEY.length < 10) {
            _updateLegend(null);
            return;
        }

        // OWM weather tile: https://tile.openweathermap.org/map/{layer}/{z}/{x}/{y}.png?appid={key}
        weatherLayer = L.tileLayer(
            "https://tile.openweathermap.org/map/" + cfg.owmName + "/{z}/{x}/{y}.png?appid=" + OWM_API_KEY,
            {
                opacity:           cfg.opacity,
                maxZoom:           18,
                keepBuffer:        2,
                updateWhenIdle:    true,
                updateWhenZooming: false,
                // Error tile (area tanpa data) tidak ditampilkan
                errorTileUrl:      "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
            }
        );

        weatherLayer.addTo(map);
        _updateLegend(layerName);
    }

    // ════════════════════════════════════════════════════════
    // LEGEND
    // ════════════════════════════════════════════════════════
    function _updateLegend(layerName) {
        var legend = document.getElementById("heatmap-legend");
        if (!legend) return;

        if (!layerName) {
            legend.style.display = "none";
            return;
        }

        var cfg = LAYER_CONFIG[layerName];
        if (!cfg) { legend.style.display = "none"; return; }

        document.getElementById("legend-title").textContent    = cfg.title;
        document.getElementById("legend-bar").style.background = cfg.gradientCss;
        document.getElementById("legend-min").textContent      = cfg.legendMin;
        document.getElementById("legend-max").textContent      = cfg.legendMax;
        legend.style.display = "block";
    }

    // ════════════════════════════════════════════════════════
    // PUBLIC API — dipanggil RadarMapController.java
    // Semua signature TIDAK BERUBAH
    // ════════════════════════════════════════════════════════

    function setWeatherLayer(layerName) {
        currentLayer = layerName;
        _applyWeatherLayer(layerName);
    }

    function zoomIn()  { if (map) map.zoomIn(); }
    function zoomOut() { if (map) map.zoomOut(); }

    function goToCurrentLocation() {
        if (!map) return;
        map.flyTo([DEFAULT_LAT, DEFAULT_LON], 10, { animate: true, duration: 1.0 });
        if (currentMarker) currentMarker.openPopup();
    }

    function flyToCity(lat, lng, name, desc) {
        if (!map) return;
        DEFAULT_LAT  = lat;
        DEFAULT_LON  = lng;
        DEFAULT_CITY = name;

        map.flyTo([lat, lng], 10, { animate: true, duration: 1.2 });

        if (currentMarker) {
            currentMarker.setLatLng([lat, lng]);
            currentMarker.setPopupContent("<b>" + name + "</b><br>" + desc);
            currentMarker.openPopup();
        }
    }

    function onResize(w, h) {
        var mapDiv = document.getElementById("map");
        mapDiv.style.width  = w + "px";
        mapDiv.style.height = h + "px";
        if (map) map.invalidateSize({ animate: false });
    }
</script>
</body>
</html>
