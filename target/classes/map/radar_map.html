<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>WeatherWise Radar</title>
        <link rel="stylesheet"
              href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #aad3df;
            }

            /* KUNCI FIX: Jangan pakai 100%, set via JS */
            #map {
                width: 100%;
                height: 100%;
                background: #aad3df;
                position: absolute;
                top: 0;
                left: 0;
            }

            .leaflet-control-attribution {
                font-size: 9px;
                opacity: 0.5;
            }
            .leaflet-popup-content-wrapper {
                background: #1e293b;
                color: white;
                border-radius: 12px;
                border: 1px solid #334155;
            }
            .leaflet-popup-tip {
                background: #1e293b;
            }
            .current-location-marker {
                background: #2b8cee;
                border: 3px solid white;
                border-radius: 50%;
                box-shadow: 0 0 0 4px rgba(43,140,238,0.35);
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%   {
                    box-shadow: 0 0 0 0   rgba(43,140,238,0.5);
                }
                70%  {
                    box-shadow: 0 0 0 14px rgba(43,140,238,0);
                }
                100% {
                    box-shadow: 0 0 0 0   rgba(43,140,238,0);
                }
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>

            var map = null;
            var API_KEY = "YOUR_API_KEY";
            var weatherLayers = {};
            var simulationCircles = [];
            var currentMarker = null;

            var radarData = {
                precipitation: [
                    [37.85, -122.55, '#93c5fd', 0.35],
                    [37.80, -122.48, '#4ade80', 0.35],
                    [37.77, -122.42, '#facc15', 0.35],
                    [37.74, -122.38, '#f97316', 0.35],
                    [37.70, -122.44, '#ef4444', 0.35],
                    [37.65, -122.50, '#4ade80', 0.30]
                ],
                clouds: [
                    [37.90, -122.60, '#93c5fd', 0.30],
                    [37.77, -122.44, '#4ade80', 0.30],
                    [37.72, -122.40, '#facc15', 0.30],
                    [37.68, -122.50, '#93c5fd', 0.25]
                ],
                wind: [
                    [37.82, -122.50, '#facc15', 0.30],
                    [37.77, -122.44, '#f97316', 0.35],
                    [37.68, -122.42, '#4ade80', 0.30],
                    [37.85, -122.38, '#93c5fd', 0.25]
                ],
                temp: [
                    [37.90, -122.60, '#93c5fd', 0.30],
                    [37.77, -122.44, '#facc15', 0.35],
                    [37.68, -122.40, '#ef4444', 0.40],
                    [37.82, -122.55, '#4ade80', 0.30]
                ]
            };

            // ── KUNCI FIX: Set ukuran #map secara eksplisit dalam px ──
            function setMapSize() {
                var mapDiv = document.getElementById('map');
                mapDiv.style.width = window.innerWidth + 'px';
                mapDiv.style.height = window.innerHeight + 'px';
            }

            // ── initMap dipanggil dari Java ────────────────────────────
            function initMap() {
                // Set ukuran eksplisit dulu
                setMapSize();

                if (map !== null) {
                    setMapSize();
                    map.invalidateSize({animate: false});
                    return;
                }

                map = L.map('map', {
                    center: [37.7749, -122.4194],
                    zoom: 10,
                    zoomControl: false,
                    preferCanvas: true,
                    dragging: true,
                    touchZoom: true,
                    scrollWheelZoom: true,
                    doubleClickZoom: true
                });

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    keepBuffer: 4,
                    updateWhenIdle: false,
                    updateWhenZooming: false,
                    subdomains: ['a', 'b', 'c'],
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);

                ['precipitation', 'clouds', 'wind', 'temp'].forEach(function (name) {
                    weatherLayers[name] = L.tileLayer(
                            'https://tile.openweathermap.org/map/' + name + '_new/{z}/{x}/{y}.png?appid=' + API_KEY,
                            {opacity: 0.7, maxZoom: 18}
                    );
                });

                var currentIcon = L.divIcon({
                    className: 'current-location-marker',
                    iconSize: [16, 16],
                    iconAnchor: [8, 8]
                });
                currentMarker = L.marker([37.7749, -122.4194], {icon: currentIcon})
                        .bindPopup('<b>San Francisco, CA</b><br>Light Rain · 62°F')
                        .addTo(map);

                showSimulatedRadar('precipitation');

                // Panggil lagi setelah init untuk pastikan tile penuh
                setTimeout(function () {
                    setMapSize();
                    map.invalidateSize({animate: false});
                }, 100);
            }

            function showSimulatedRadar(type) {
                simulationCircles.forEach(function (c) {
                    if (map && map.hasLayer(c))
                        map.removeLayer(c);
                });
                simulationCircles = [];
                var points = radarData[type] || radarData.precipitation;
                points.forEach(function (p) {
                    var circle = L.circle([p[0], p[1]], {
                        radius: 7000, color: 'transparent',
                        fillColor: p[2], fillOpacity: p[3],
                        interactive: false
                    }).addTo(map);
                    simulationCircles.push(circle);
                });
            }

            // Dipanggil dari Java saat window resize
            function onResize(w, h) {
                var mapDiv = document.getElementById('map');
                mapDiv.style.width = w + 'px';
                mapDiv.style.height = h + 'px';
                if (map)
                    map.invalidateSize({animate: false});
            }

            function safeInvalidateSize() {
                if (map) {
                    setMapSize();
                    map.invalidateSize({animate: false});
                }
            }

            function zoomIn() {
                if (map)
                    map.zoomIn();
            }
            function zoomOut() {
                if (map)
                    map.zoomOut();
            }

            function goToCurrentLocation() {
                if (!map)
                    return;
                map.flyTo([37.7749, -122.4194], 12, {animate: true, duration: 1.0});
                if (currentMarker)
                    currentMarker.openPopup();
            }

            function setWeatherLayer(layerName) {
                if (!map)
                    return;
                Object.values(weatherLayers).forEach(function (l) {
                    if (map.hasLayer(l))
                        map.removeLayer(l);
                });
                if (API_KEY !== 'YOUR_API_KEY' && weatherLayers[layerName]) {
                    weatherLayers[layerName].addTo(map);
                }
                showSimulatedRadar(layerName);
            }

            function flyToCity(lat, lng, name, desc) {
                if (!map)
                    return;
                map.flyTo([lat, lng], 12, {animate: true, duration: 1.2});
                if (currentMarker) {
                    currentMarker.setLatLng([lat, lng]);
                    currentMarker.setPopupContent('<b>' + name + '</b><br>' + desc);
                    currentMarker.openPopup();
                }
            }

            function setApiKey(key) {
                API_KEY = key;
            }

        </script>
    </body>
</html>
