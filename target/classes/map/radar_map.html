<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>WeatherWise Radar</title>
        <link rel="stylesheet"
              href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"/>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body {
                width: 100%; height: 100%;
                overflow: hidden;
                background: #aad3df;
            }
            #map {
                width: 100%; height: 100%;
                background: #aad3df;
                position: absolute;
                top: 0; left: 0;
            }
            .leaflet-control-attribution { font-size: 9px; opacity: 0.5; }
            .leaflet-popup-content-wrapper {
                background: #1e293b; color: white;
                border-radius: 12px; border: 1px solid #334155;
            }
            .leaflet-popup-tip { background: #1e293b; }
            .current-location-marker {
                background: #2b8cee;
                border: 3px solid white;
                border-radius: 50%;
                box-shadow: 0 0 0 4px rgba(43,140,238,0.35);
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%   { box-shadow: 0 0 0 0   rgba(43,140,238,0.5); }
                70%  { box-shadow: 0 0 0 14px rgba(43,140,238,0); }
                100% { box-shadow: 0 0 0 0   rgba(43,140,238,0); }
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            var map           = null;
            var API_KEY       = "";
            var weatherLayers = {};
            var simulationLayers = [];
            var currentMarker = null;
            var currentLayer  = 'precipitation';

            var DEFAULT_LAT  = -6.2088;
            var DEFAULT_LON  = 106.8456;
            var DEFAULT_CITY = "Jakarta, ID";

            // ── Palette warna per layer ──────────────────────
            var layerColors = {
                precipitation: [
                    { threshold: 0.0, color: '#93c5fd' },
                    { threshold: 0.3, color: '#4ade80' },
                    { threshold: 0.5, color: '#facc15' },
                    { threshold: 0.7, color: '#f97316' },
                    { threshold: 0.9, color: '#ef4444' }
                ],
                clouds: [
                    { threshold: 0.0, color: '#e0f2fe' },
                    { threshold: 0.4, color: '#93c5fd' },
                    { threshold: 0.7, color: '#60a5fa' },
                    { threshold: 0.9, color: '#3b82f6' }
                ],
                wind: [
                    { threshold: 0.0, color: '#d1fae5' },
                    { threshold: 0.3, color: '#6ee7b7' },
                    { threshold: 0.6, color: '#facc15' },
                    { threshold: 0.85, color: '#f97316' }
                ],
                temp: [
                    { threshold: 0.0, color: '#93c5fd' },
                    { threshold: 0.25, color: '#6ee7b7' },
                    { threshold: 0.5, color: '#facc15' },
                    { threshold: 0.75, color: '#f97316' },
                    { threshold: 0.9, color: '#ef4444' }
                ]
            };

            // ── Pseudo-noise deterministik ────────────────────
            function pseudoNoise(x, y, seed) {
                var n = Math.sin(x * 127.1 + y * 311.7 + seed * 74.3) * 43758.5453;
                return n - Math.floor(n);
            }

            function getColor(value, palette) {
                var color = palette[0].color;
                for (var i = 0; i < palette.length; i++) {
                    if (value >= palette[i].threshold) color = palette[i].color;
                }
                return color;
            }

            // ── Render heatmap tile grid ──────────────────────
            function showSimulatedRadar(layerType) {
                simulationLayers.forEach(function(l) {
                    if (map && map.hasLayer(l)) map.removeLayer(l);
                });
                simulationLayers = [];
                if (!map) return;

                var palette  = layerColors[layerType] || layerColors.precipitation;
                var seed     = { precipitation:1, clouds:2, wind:3, temp:4 }[layerType] || 1;
                var tileSize = 0.045;
                var gridN    = 20;
                var startLat = DEFAULT_LAT - (gridN / 2) * tileSize;
                var startLng = DEFAULT_LON - (gridN / 2) * tileSize;

                for (var row = 0; row < gridN; row++) {
                    for (var col = 0; col < gridN; col++) {
                        var tileLat = startLat + row * tileSize;
                        var tileLng = startLng + col * tileSize;

                        var raw     = pseudoNoise(tileLat, tileLng, seed);
                        var distLat = (row - gridN / 2) / gridN;
                        var distLng = (col - gridN / 2) / gridN;
                        var dist    = Math.sqrt(distLat * distLat + distLng * distLng);
                        var value   = raw * 0.5 + (1 - dist * 1.8) * 0.5;
                        value = Math.max(0, Math.min(1, value));

                        if (value < 0.18) continue;

                        var color   = getColor(value, palette);
                        var opacity = 0.18 + value * 0.38;

                        var rect = L.rectangle(
                            [[tileLat, tileLng],
                             [tileLat + tileSize, tileLng + tileSize]],
                            {
                                color:       'transparent',
                                fillColor:   color,
                                fillOpacity: opacity,
                                weight:      0,
                                interactive: false,
                                smoothFactor: 0
                            }
                        );
                        rect.addTo(map);
                        simulationLayers.push(rect);
                    }
                }
            }

            // ── Ukuran map ────────────────────────────────────
            function setMapSize() {
                var mapDiv = document.getElementById('map');
                mapDiv.style.width  = window.innerWidth  + 'px';
                mapDiv.style.height = window.innerHeight + 'px';
            }

            // ── Inject API key dari Java ──────────────────────
            function setApiKey(key) {
                API_KEY = key;
                if (map !== null) {
                    ['precipitation_new','clouds_new','wind_new','temp_new'].forEach(function(name) {
                        var shortName = name.replace('_new', '');
                        if (weatherLayers[shortName] && map.hasLayer(weatherLayers[shortName])) {
                            map.removeLayer(weatherLayers[shortName]);
                        }
                        weatherLayers[shortName] = L.tileLayer(
                            'https://tile.openweathermap.org/map/' + name + '/{z}/{x}/{y}.png?appid=' + API_KEY,
                            { opacity: 0.7, maxZoom: 18 }
                        );
                    });
                }
            }

            // ── Init peta ─────────────────────────────────────
            function initMap() {
                setMapSize();

                if (map !== null) {
                    map.invalidateSize({ animate: false });
                    return;
                }

                map = L.map('map', {
                    center: [DEFAULT_LAT, DEFAULT_LON],
                    zoom: 10,
                    zoomControl: false,
                    preferCanvas: true,
                    dragging: true,
                    touchZoom: true,
                    scrollWheelZoom: true,
                    doubleClickZoom: true
                });

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 18,
                    keepBuffer: 4,
                    updateWhenIdle: false,
                    updateWhenZooming: false,
                    subdomains: ['a','b','c'],
                    attribution: '\u00a9 OpenStreetMap contributors'
                }).addTo(map);

                ['precipitation_new','clouds_new','wind_new','temp_new'].forEach(function(name) {
                    var shortName = name.replace('_new', '');
                    weatherLayers[shortName] = L.tileLayer(
                        'https://tile.openweathermap.org/map/' + name + '/{z}/{x}/{y}.png?appid=' + (API_KEY || ''),
                        { opacity: 0.7, maxZoom: 18 }
                    );
                });

                var currentIcon = L.divIcon({
                    className: 'current-location-marker',
                    iconSize:  [16, 16],
                    iconAnchor:[8, 8]
                });
                currentMarker = L.marker([DEFAULT_LAT, DEFAULT_LON], { icon: currentIcon })
                    .bindPopup('<b>' + DEFAULT_CITY + '</b><br>Memuat cuaca...')
                    .addTo(map);

                showSimulatedRadar('precipitation');

                setTimeout(function() {
                    setMapSize();
                    map.invalidateSize({ animate: false });
                }, 100);
            }

            // ── Resize ────────────────────────────────────────
            function onResize(w, h) {
                var mapDiv = document.getElementById('map');
                mapDiv.style.width  = w + 'px';
                mapDiv.style.height = h + 'px';
                if (map) map.invalidateSize({ animate: false });
            }

            // ── Zoom ──────────────────────────────────────────
            function zoomIn()  { if (map) map.zoomIn(); }
            function zoomOut() { if (map) map.zoomOut(); }

            // ── Kembali ke lokasi aktif ───────────────────────
            function goToCurrentLocation() {
                if (!map) return;
                map.flyTo([DEFAULT_LAT, DEFAULT_LON], 12, { animate: true, duration: 1.0 });
                if (currentMarker) currentMarker.openPopup();
            }

            // ── Ganti layer cuaca ─────────────────────────────
            function setWeatherLayer(layerName) {
                currentLayer = layerName;
                if (!map) return;
                Object.values(weatherLayers).forEach(function(l) {
                    if (map.hasLayer(l)) map.removeLayer(l);
                });
                if (API_KEY && API_KEY.length > 10 && weatherLayers[layerName]) {
                    weatherLayers[layerName].addTo(map);
                }
                showSimulatedRadar(layerName);
            }

            // ── Fly ke kota baru ──────────────────────────────
            function flyToCity(lat, lng, name, desc) {
                if (!map) return;
                DEFAULT_LAT  = lat;
                DEFAULT_LON  = lng;
                DEFAULT_CITY = name;

                map.flyTo([lat, lng], 12, { animate: true, duration: 1.2 });

                if (currentMarker) {
                    currentMarker.setLatLng([lat, lng]);
                    currentMarker.setPopupContent('<b>' + name + '</b><br>' + desc);
                    currentMarker.openPopup();
                }

                // Regenerate heatmap tile di lokasi baru
                showSimulatedRadar(currentLayer || 'precipitation');
            }
        </script>
    </body>
</html>
