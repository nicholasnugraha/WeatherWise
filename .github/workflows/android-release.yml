name: Android Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag rilis (contoh: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Generate local.properties from CI secrets
        run: |
          cat <<EOT > local.properties
          WEATHER_API_KEY_DEBUG=${{ secrets.OW_API_KEY_DEBUG }}
          WEATHER_API_KEY_RELEASE=${{ secrets.OW_API_KEY_RELEASE }}
          OW_TILE_BASE_URL=https://tile.openweathermap.org/map
          EOT

      - name: Ensure Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release-unsigned.apk "dist/WeatherWise-${{ steps.tag.outputs.value }}.apk"

      - name: Create GitHub Release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: WeatherWise ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: dist/*.apk
